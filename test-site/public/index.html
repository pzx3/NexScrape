<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التطبيقات الحديثة (SPA)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .product-list { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .product-card { 
            background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; 
            width: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-title { font-size: 1.2rem; margin: 0 0 10px 0; color: #333; }
        .product-price { font-weight: bold; color: #e63946; font-size: 1.1rem; }
        .stock-status { font-size: 0.9rem; margin-top: 10px; }
        .in-stock { color: #2a9d8f; }
        .out-of-stock { color: #e76f51; }
        #loader { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { display: block; margin: 20px auto; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

    <div class="header">
        <h1>متجر NexScrape التجريبي</h1>
        <p>هذه الصفحة لا تحتوي على منتجات في الـ HTML الأصلي. يجب الضغط على الزر واستهلاك الجافاسكريبت.</p>
    </div>

    <!-- زر تحميل الواجهة الذي سيحاكيه الـ Script -->
    <button id="load-more-btn" onclick="fetchProducts()">تحميل أحدث المنتجات</button>

    <!-- شاشة التحميل الوهمية -->
    <div id="loader"></div>

    <!-- حاوية المنتجات الديناميكية -->
    <div id="app-root" class="product-list"></div>

    <script>
        // دالة تحاكي ما يفعله React / Vue بجلب البيانات ورسم الـ DOM
        async function fetchProducts() {
            document.getElementById('load-more-btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch('/api/products');
                const result = await response.json();
                
                document.getElementById('loader').style.display = 'none';
                
                const root = document.getElementById('app-root');
                result.data.forEach(prod => {
                    const statusClass = prod.inStock ? 'in-stock' : 'out-of-stock';
                    const statusText = prod.inStock ? 'متوفر بالمخزن' : 'نفذت الكمية';
                    
                    const card = document.createElement('div');
                    card.className = 'product-card item-box';
                    card.innerHTML = `
                        <h2 class="product-title" data-id="${prod.id}">${prod.name}</h2>
                        <div class="product-price"> SAR ${prod.price}</div>
                        <div class="stock-status ${statusClass}">${statusText}</div>
                    `;
                    root.appendChild(card);
                });

            } catch (err) {
                console.error("Network Error: ", err);
            }
        }
    </script>
</body>
</html>
